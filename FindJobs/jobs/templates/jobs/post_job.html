{% load crispy_forms_tags %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Job - Job Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="{% url 'home' %}" class="text-2xl font-bold text-purple-600"
            >Job Portal</a
          >

          <div class="flex items-center space-x-4">
            <span class="text-gray-700">
              <strong>{{ user.username }}</strong>
            </span>
            <a
              href="{% url 'logout' %}"
              class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200 font-semibold"
            >
              Logout
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <!-- Back Button -->
      <a
        href="{% url 'staff_dashboard' %}"
        class="inline-flex items-center text-purple-600 hover:text-purple-800 mb-8"
      >
        <svg
          class="w-5 h-5 mr-2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
        Back to Dashboard
      </a>

      <!-- Form Card -->
      <div class="bg-white rounded-lg shadow-md p-8 border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Post a New Job</h1>
        <p class="text-gray-600 mb-8">
          Fill in the details to post a job opening
        </p>

        <!-- Display Messages -->
        {% if messages %} {% for message in messages %}
        <div
          class="mb-4 p-4 rounded-lg {% if message.tags %}bg-red-50 border border-red-200 text-red-800{% else %}bg-green-50 border border-green-200 text-green-800{% endif %}"
        >
          {{ message }}
        </div>
        {% endfor %} {% endif %}

        <!-- Job Form -->
        <form method="POST" class="space-y-6">
          {% csrf_token %}

          <!-- Job Title -->
          <div>
            <label
              for="post"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Job Title</label
            >
            <input
              type="text"
              id="post"
              name="post"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              placeholder="e.g., Senior Developer"
              required
            />
          </div>

          <!-- Organization -->
          <div>
            <label
              for="organization"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Organization</label
            >
            <input
              type="text"
              id="organization"
              name="organization"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              placeholder="e.g., Tech Company Ltd."
              required
            />
          </div>

          <!-- Description -->
          <div>
            <label
              for="description"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Job Description</label
            >
            <textarea
              id="description"
              name="description"
              rows="6"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              placeholder="Describe the job responsibilities, requirements, etc."
              required
            ></textarea>
          </div>

          <!-- Location -->
          <div>
            <label
              for="location"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Location</label
            >
            <input
              type="text"
              id="location"
              name="location"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              placeholder="e.g., Dhaka, Bangladesh"
              required
            />
          </div>

          <!-- Work Hours -->
          <div>
            <label
              for="work_hour"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Work Hours</label
            >
            <input
              type="text"
              id="work_hour"
              name="work_hour"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              placeholder="e.g., 30 hours/week or Part-time"
              required
            />
          </div>

          <!-- Hourly Pay -->
          <div>
            <label
              for="hourly_pay"
              class="block text-sm font-semibold text-gray-700 mb-2"
              >Hourly Rate (BDT)</label
            >
            <input
              type="number"
              id="hourly_pay"
              name="hourly_pay"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              placeholder="e.g., 500"
              min="1"
              required
            />
          </div>

          <!-- Buttons -->
          <div class="flex gap-4 pt-4">
            <button
              type="submit"
              class="flex-1 bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition-colors duration-200 font-bold"
            >
              Post Job
            </button>
            <a
              href="{% url 'staff_dashboard' %}"
              class="flex-1 bg-gray-300 text-gray-900 py-3 rounded-lg hover:bg-gray-400 transition-colors duration-200 font-bold text-center"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
