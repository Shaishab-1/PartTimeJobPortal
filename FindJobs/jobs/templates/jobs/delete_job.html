{% load crispy_forms_tags %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Job - Job Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="{% url 'home' %}" class="text-2xl font-bold text-purple-600"
            >Job Portal</a
          >

          <div class="flex items-center space-x-4">
            <span class="text-gray-700">
              <strong>{{ user.username }}</strong>
            </span>
            <a
              href="{% url 'logout' %}"
              class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200 font-semibold"
            >
              Logout
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <!-- Back Button -->
      <a
        href="{% url 'staff_dashboard' %}"
        class="inline-flex items-center text-purple-600 hover:text-purple-800 mb-8"
      >
        <svg
          class="w-5 h-5 mr-2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
        Back to Dashboard
      </a>

      <!-- Confirmation Card -->
      <div
        class="bg-white rounded-lg shadow-md border border-red-200 p-8 max-w-md mx-auto"
      >
        <div class="text-center">
          <div class="mb-4 flex justify-center">
            <div
              class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center"
            >
              <svg
                class="w-8 h-8 text-red-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </div>
          </div>

          <h1 class="text-2xl font-bold text-gray-900 mb-2">
            Delete Job Posting?
          </h1>

          <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
            <p class="text-sm font-semibold text-gray-900 mb-2">
              {{ job.post }}
            </p>
            <p class="text-xs text-gray-600">{{ job.organization }}</p>
          </div>

          <p class="text-gray-600 mb-6">
            This action cannot be undone. All related applications will also be
            deleted.
          </p>

          <!-- Buttons -->
          <form method="POST" class="space-y-3">
            {% csrf_token %}
            <button
              type="submit"
              class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition-colors duration-200 font-semibold"
            >
              Yes, Delete Job
            </button>
          </form>

          <a
            href="{% url 'staff_dashboard' %}"
            class="block w-full bg-gray-300 text-gray-900 py-2 rounded-lg hover:bg-gray-400 transition-colors duration-200 font-semibold mt-2"
          >
            Cancel
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
