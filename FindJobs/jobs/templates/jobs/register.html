{% extends 'jobs/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Join - Job Portal{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center px-4 py-20 bg-gradient-to-br from-indigo-50 to-blue-50">
    <div class="w-full max-w-2xl">
        <!-- Register Card -->
        <div class="bg-white rounded-[3rem] shadow-2xl border border-gray-100 overflow-hidden">
            <div class="p-8 sm:p-16">
                <div class="text-center mb-12">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-indigo-50 rounded-[2rem] mb-6">
                        <svg class="w-12 h-12 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    </div>
                    <h1 class="text-4xl font-black text-gray-900 mb-2">Join the Network</h1>
                    <p class="text-gray-500 font-bold">Start your journey as a Job Seeker or Employer</p>
                </div>

                <!-- Register Form -->
                <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    {% csrf_token %}

                    <div class="md:col-span-2">
                        <label for="user_type" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Account Type</label>
                        <select name="user_type" id="user_type" class="w-full px-8 py-5 bg-gray-50 border-2 border-transparent rounded-3xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-black text-gray-900 shadow-inner appearance-none cursor-pointer">
                            <option value="normal">Job Seeker</option>
                            <option value="staff">Employer (Hire Talent)</option>
                        </select>
                    </div>

                    <div class="md:col-span-1">
                        <label for="username" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Username</label>
                        <input type="text" id="username" name="username" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-bold text-gray-900 placeholder-gray-400" placeholder="Unique User ID" required>
                    </div>

                    <div class="md:col-span-1">
                        <label for="email" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Email</label>
                        <input type="email" id="email" name="email" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-bold text-gray-900 placeholder-gray-400" placeholder="name@example.com" required>
                    </div>

                    <div class="md:col-span-1">
                        <label for="password1" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                        <input type="password" id="password1" name="password1" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-bold text-gray-900 placeholder-gray-400" placeholder="Min 8 characters" required>
                    </div>

                    <div class="md:col-span-1">
                        <label for="password2" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
                        <input type="password" id="password2" name="password2" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-bold text-gray-900 placeholder-gray-400" placeholder="Repeat password" required>
                    </div>

                    <div class="md:col-span-2 pt-6">
                        <button type="submit" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-200">
                            Create Professional Account
                        </button>
                    </div>
                </form>

                <div class="mt-12 pt-8 border-t border-gray-100 text-center">
                    <p class="text-gray-500 font-bold mb-4">Already a member?</p>
                    <a href="{% url 'login' %}" class="inline-block text-indigo-600 font-black hover:text-indigo-700 transition-colors">
                        Sign in to your account here →
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
