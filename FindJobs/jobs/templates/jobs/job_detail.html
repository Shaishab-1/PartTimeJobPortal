<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
</head>
<body>

    <h1>{{ job.post }}</h1>

    <p><strong>Organization:</strong> {{ job.organization }}</p>
    <p><strong>Description:</strong> {{ job.description }}</p>
    <p><strong>Location:</strong> {{ job.location }}</p>
    <p><strong>Work Hour:</strong> {{ job.work_hour }}</p>
    <p><strong>Hourly Pay:</strong> {{ job.hourly_pay }}</p>
    <p><strong>Posted by:</strong> {{ job.posted_by.username }}</p>

    <br>
    <form method="POST">
    {% csrf_token %}
    <button type="submit">Apply</button>
    </form>

    <br><br>
    <a href="/">⬅ Back to Home</a>

</body>
</html>
