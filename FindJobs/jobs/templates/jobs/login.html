{% load crispy_forms_tags %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Job Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="{% url 'home' %}" class="text-2xl font-bold text-blue-600"
            >Job Portal</a
          >
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-lg shadow-md border border-gray-200 p-8">
          <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">
            Welcome Back
          </h1>
          <p class="text-gray-600 text-center mb-8">Sign in to your account</p>

          <!-- Display Messages -->
          {% if messages %} {% for message in messages %}
          <div
            class="mb-4 p-4 rounded-lg {% if message.tags %}bg-red-50 border border-red-200 text-red-800{% else %}bg-green-50 border border-green-200 text-green-800{% endif %}"
          >
            {{ message }}
          </div>
          {% endfor %} {% endif %}

          <!-- Login Form -->
          <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username Field -->
            <div>
              <label
                for="username"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Username</label
              >
              <input
                type="text"
                id="username"
                name="username"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                placeholder="Enter your username"
                required
              />
            </div>

            <!-- Password Field -->
            <div>
              <label
                for="password"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                placeholder="Enter your password"
                required
              />
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors duration-200 font-semibold"
            >
              Sign In
            </button>
          </form>

          <!-- Divider -->
          <div class="mt-8 relative">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-2 bg-white text-gray-500">New user?</span>
            </div>
          </div>

          <!-- Sign Up Link -->
          <a
            href="{% url 'register' %}"
            class="mt-8 block w-full bg-gray-100 text-gray-900 py-2 rounded-lg hover:bg-gray-200 transition-colors duration-200 font-semibold text-center"
          >
            Create Account
          </a>
        </div>

        <!-- Help Text -->
        <p class="text-center text-gray-600 text-sm mt-6">
          <a href="{% url 'home' %}" class="text-blue-600 hover:text-blue-800"
            >← Back to Home</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
