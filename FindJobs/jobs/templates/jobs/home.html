<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
</head>
<body>
    <h1>Available Jobs</h1>

    {% for job in jobs %}
        <div style="border:1px solid black; margin:10px; padding:10px;">

            <h2>
                <a href="{% url 'job_detail' job.id %}">
                    {{ job.post }}
                </a>
            </h2>
            <p><strong>Organization:</strong> {{ job.organization }}</p>
            <p>{{ job.description }}</p>
            <p><strong>Location:</strong> {{ job.location }}</p>
            <p><strong>Work Hour:</strong> {{ job.work_hour }}</p>
            <p><strong>Hourly Pay:</strong> {{ job.hourly_pay }}</p>

        </div>
    {% empty %}
        <p>No jobs available</p>
    {% endfor %}

</body>
</html>
