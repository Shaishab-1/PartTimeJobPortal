{% extends 'jobs/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Job Portal{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-20 bg-gradient-to-br from-blue-50 to-indigo-50">
    <div class="w-full max-w-lg">
        <!-- Login Card -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
            <div class="p-8 sm:p-12">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 rounded-3xl mb-6">
                        <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-4.514A9.01 9.01 0 0012 15a9.01 9.01 0 005.193-1.636M12 11V7a4 4 0 10-8 0v4m8 0a4 4 0 108 0V7a4 4 0 00-8 0v4m-4-4h4m-4 4h4m-4 4h4m-4 4h4"></path></svg>
                    </div>
                    <h1 class="text-4xl font-black text-gray-900 mb-2">Welcome Back</h1>
                    <p class="text-gray-500 font-bold">Access your professional dashboard</p>
                </div>

                <!-- Login Form -->
                <form method="POST" class="space-y-6">
                    {% csrf_token %}

                    <div>
                        <label for="username" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Username</label>
                        <input type="text" id="username" name="username" 
                            class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-bold text-gray-900 placeholder-gray-400 shadow-inner" 
                            placeholder="Your unique identifier" required>
                    </div>

                    <div>
                        <label for="password" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                        <input type="password" id="password" name="password" 
                            class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-bold text-gray-900 placeholder-gray-400 shadow-inner" 
                            placeholder="••••••••" required>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 active:scale-[0.98]">
                            Sign In
                        </button>
                    </div>
                </form>

                <div class="mt-12 pt-8 border-t border-gray-100 text-center">
                    <p class="text-gray-500 font-bold mb-4 italic">No account yet?</p>
                    <a href="{% url 'register' %}" class="inline-block text-blue-600 font-black hover:text-blue-700 transition-colors">
                        Create your professional profile here →
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
